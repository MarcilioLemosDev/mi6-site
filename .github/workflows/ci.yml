name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo para a varredura de segredo
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      # Browser para o teste de XSS/DOM (SEC-13); se faltar, o teste se auto-pula.
      - run: npx playwright install --with-deps chromium
      # Portão de segurança (WS6): a suíte tem de passar para o merge seguir.
      - run: npm test
      - run: npm run build
      # Varredura de segredo (SEC-06a): a SAS URL não pode estar no bundle nem
      # no histórico. Roda após o build para inspecionar o dist/ também.
      - run: npm run audit:segredos
      # Auditoria de dependências (WS5/#12): informativa por enquanto; vira
      # bloqueante quando a triagem de high/critical estiver feita.
      - name: npm audit (informativo)
        run: npm audit --audit-level=high
        continue-on-error: true
